{% extends 'inventory/base.html' %}

{% block title %}尺码管理{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="card-title mb-0">尺码管理</h2>
                        <p class="text-muted mb-0">自定义商品尺码标签</p>
                    </div>
                    <a href="{% url 'size_create' %}" class="btn btn-primary">
                        <i class="bi bi-plus-circle me-1"></i> 添加尺码
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                {% if sizes %}
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>尺码名称</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for size in sizes %}
                            <tr>
                                <td><span class="badge bg-dark">{{ size.name }}</span></td>
                                <td>
                                    <a href="{% url 'size_edit' size.id %}" class="btn btn-sm btn-outline-secondary">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a href="{% url 'size_delete' size.id %}" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
                {% else %}
                <div class="text-center py-5">
                    <i class="bi bi-rulers text-muted" style="font-size: 2.5rem;"></i>
                    <p class="mt-3 mb-0">暂无自定义尺码</p>
                    <a href="{% url 'size_create' %}" class="btn btn-primary mt-3">添加第一个尺码</a>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
