{% extends 'inventory/base.html' %}

{% block title %}取消销售单 - {{ block.super }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-danger text-white">
            <h4 class="card-title mb-0">取消销售单 #{{ sale.id }}</h4>
        </div>
        <div class="card-body">
            <p class="mb-3">
                取消后将恢复该销售单中的商品库存。请确认该销售单尚未完成收款。
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="reason" class="form-label">取消原因</label>
                    <textarea id="reason" name="reason" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-danger">确认取消</button>
                <a href="{% url 'sale_detail' sale.id %}" class="btn btn-outline-secondary ms-2">返回详情</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
