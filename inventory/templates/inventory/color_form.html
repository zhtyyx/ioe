{% extends 'inventory/base.html' %}

{% block title %}{% if color %}编辑颜色{% else %}添加颜色{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="card-title mb-0">{% if color %}编辑颜色{% else %}添加颜色{% endif %}</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="name" class="form-label">颜色名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name"
                               value="{{ color.name|default:'' }}" required
                               placeholder="例如：卡其色、海军蓝">
                    </div>
                    <div class="mb-3">
                        <label for="code" class="form-label">颜色代码</label>
                        <input type="text" class="form-control" id="code" name="code"
                               value="{{ color.code|default:'' }}"
                               placeholder="例如：#FF5733 或 red">
                        <div class="form-text">可选，用于展示颜色预览</div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <a href="{% url 'color_list' %}" class="btn btn-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
