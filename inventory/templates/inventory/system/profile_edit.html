{% extends 'inventory/base.html' %}

{% block title %}个人资料{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="card-title mb-0">个人资料 — {{ user.username }}</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="phone" class="form-label">手机号</label>
                        <input type="text" name="phone" id="phone" class="form-control" value="{{ profile.phone|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label for="department" class="form-label">部门</label>
                        <input type="text" name="department" id="department" class="form-control" value="{{ profile.department|default:'' }}" placeholder="例如：销售部">
                    </div>
                    <div class="mb-3">
                        <label for="employee_id" class="form-label">工号</label>
                        <input type="text" name="employee_id" id="employee_id" class="form-control" value="{{ profile.employee_id|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">备注</label>
                        <textarea name="notes" id="notes" class="form-control" rows="3">{{ profile.notes|default:'' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">保存</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
