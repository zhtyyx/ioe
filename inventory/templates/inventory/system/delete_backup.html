{% extends 'inventory/base.html' %}

{% block title %}删除备份 - {{ block.super }}{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title mb-1">删除备份</h2>
                <p class="text-muted mb-0">确认删除系统备份</p>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="card-title mb-0">危险操作</h5>
            </div>
            <div class="card-body">
                <p>确定要删除备份 <strong>{{ backup_name }}</strong> 吗？</p>
                <p class="text-danger">此操作不可恢复。</p>

                <form method="post" action="{% url 'delete_backup' backup_name %}">
                    {% csrf_token %}
                    <input type="hidden" name="confirm" value="on">
                    <a href="{% url 'backup_list' %}" class="btn btn-outline-secondary">取消</a>
                    <button type="submit" class="btn btn-danger">确认删除</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
